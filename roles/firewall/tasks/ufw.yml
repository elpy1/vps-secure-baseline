---
- name: Install ufw
  ansible.builtin.package:
    name: ufw
    state: present

- name: Set ufw default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ firewall_default_incoming_policy }}"

- name: Set ufw default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ firewall_default_outgoing_policy }}"

- name: Allow TCP ports with ufw
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow UDP ports with ufw
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_allowed_udp_ports }}"

- name: Enable ufw
  community.general.ufw:
    state: enabled
