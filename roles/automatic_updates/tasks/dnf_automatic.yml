---
- name: Install dnf-automatic
  ansible.builtin.package:
    name: dnf-automatic
    state: present

- name: Configure dnf-automatic to apply updates
  ansible.builtin.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: apply_updates
    value: "yes"
    mode: "0644"
  notify: Restart dnf-automatic timer

- name: Configure dnf-automatic to only install security updates
  ansible.builtin.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: upgrade_type
    value: security
    mode: "0644"
  notify: Restart dnf-automatic timer

- name: Enable and start dnf-automatic timer
  ansible.builtin.systemd_service:
    name: dnf-automatic.timer
    enabled: true
    state: started
