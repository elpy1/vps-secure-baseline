---
time_sync_backend: "{{ 'chrony' if ansible_facts['os_family'] == 'RedHat' else 'systemd_timesyncd' }}"
time_sync_package_name: "{{ 'chrony' if time_sync_backend == 'chrony' else 'systemd-timesyncd' }}"
time_sync_service_name: "{{ 'chronyd' if time_sync_backend == 'chrony' else 'systemd-timesyncd' }}"
time_sync_status_property: NTPSynchronized
time_sync_wait_retries: 6
time_sync_wait_delay: 10
