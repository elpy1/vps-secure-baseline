---
sshd_binary_path: /usr/sbin/sshd
sshd_config_path: /etc/ssh/sshd_config.d/00-baseline.conf
sshd_service_name: "{{ 'sshd' if ansible_facts['os_family'] == 'RedHat' else 'ssh' }}"
sshd_skip_authorized_keys_check: false
sshd_authorized_keys_check_users: >-
  {{
    [ansible_user | default('', true), ansible_ssh_user | default('', true)]
    | reject('equalto', '')
    | unique
    | list
  }}
