---
- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Validate existing sshd installation and config
  ansible.builtin.command: "{{ sshd_binary_path }} -t"
  changed_when: false

- name: Refuse to disable SSH passwords without file-backed keys
  when:
    - not sshd_password_authentication | bool
    - not sshd_skip_authorized_keys_check | bool
  block:
    - name: Ensure SSH access preflight has users to check
      ansible.builtin.assert:
        that:
          - sshd_authorized_keys_check_users | length > 0
        fail_msg: >-
          Refusing to disable SSH password authentication because there are no
          users configured for the authorized_keys preflight. Set ansible_user
          or sshd_authorized_keys_check_users, or set
          sshd_skip_authorized_keys_check=true if you use external SSH auth.

    - name: Resolve home directories for SSH access preflight users
      ansible.builtin.command: "getent passwd {{ item }}"
      loop: "{{ sshd_authorized_keys_check_users }}"
      register: sshd_authorized_keys_passwd
      changed_when: false
      failed_when: false

    - name: Refuse to continue when a checked SSH user does not exist
      ansible.builtin.assert:
        that:
          - item.rc == 0
        fail_msg: >-
          Refusing to disable SSH password authentication because the checked
          user {{ item.item }} does not exist on the host. Adjust
          sshd_authorized_keys_check_users or set
          sshd_skip_authorized_keys_check=true if you use external SSH auth.
      loop: "{{ sshd_authorized_keys_passwd.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Initialize SSH access preflight targets
      ansible.builtin.set_fact:
        sshd_authorized_keys_targets: []

    - name: Build SSH access preflight targets
      ansible.builtin.set_fact:
        sshd_authorized_keys_targets: >-
          {{
            sshd_authorized_keys_targets + [
              {
                'user': item.item,
                'path': ((item.stdout.split(':'))[5]) ~ '/.ssh/authorized_keys'
              }
            ]
          }}
      loop: "{{ sshd_authorized_keys_passwd.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check authorized_keys files for SSH access preflight users
      ansible.builtin.stat:
        path: "{{ item.path }}"
      loop: "{{ sshd_authorized_keys_targets }}"
      loop_control:
        label: "{{ item.user }}"
      register: sshd_authorized_keys_files

    - name: Refuse to disable SSH passwords when no authorized_keys file is present
      ansible.builtin.assert:
        that:
          - >-
            (
              sshd_authorized_keys_files.results
              | selectattr('stat.exists')
              | selectattr('stat.isreg')
              | selectattr('stat.size', 'gt', 0)
              | list
              | length
            ) > 0
        fail_msg: >-
          Refusing to disable SSH password authentication because none of the
          checked users ({{ sshd_authorized_keys_check_users | join(', ') }})
          has a non-empty authorized_keys file. Add a public key first, set
          sshd_password_authentication=true for this host, or set
          sshd_skip_authorized_keys_check=true if you use external SSH auth.

- name: Manage sshd baseline drop-in safely
  block:
    - name: Install sshd baseline drop-in
      ansible.builtin.template:
        src: baseline.conf.j2
        dest: "{{ sshd_config_path }}"
        owner: root
        group: root
        mode: "0644"
        backup: true
      register: sshd_dropin_result

    - name: Validate updated sshd configuration
      ansible.builtin.command: "{{ sshd_binary_path }} -t"
      changed_when: false
      when: sshd_dropin_result.changed

  rescue:
    - name: Restore previous sshd drop-in from backup
      ansible.builtin.copy:
        src: "{{ sshd_dropin_result.backup_file }}"
        dest: "{{ sshd_config_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      when:
        - sshd_dropin_result is defined
        - sshd_dropin_result.backup_file is defined

    - name: Remove invalid sshd drop-in when no backup exists
      ansible.builtin.file:
        path: "{{ sshd_config_path }}"
        state: absent
      when:
        - sshd_dropin_result is defined
        - sshd_dropin_result.backup_file is not defined

    - name: Stop after restoring previous sshd configuration
      ansible.builtin.fail:
        msg: >-
          Refused to keep the new sshd drop-in because validation failed.
          The previous drop-in has been restored.

- name: Reload sshd
  ansible.builtin.systemd_service:
    name: "{{ sshd_service_name }}"
    state: reloaded
  when:
    - sshd_dropin_result is defined
    - sshd_dropin_result.changed
