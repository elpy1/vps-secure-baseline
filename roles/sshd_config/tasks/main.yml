---
- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Validate existing sshd installation and config
  ansible.builtin.command: "{{ sshd_binary_path }} -t"
  changed_when: false

- name: Check whether Debian-family SSH socket activation unit exists
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - --property=LoadState
      - --value
      - "{{ sshd_socket_unit_name }}"
  register: sshd_socket_unit_state
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['service_mgr'] == 'systemd'

- name: Ensure Debian-family SSH service is enabled and started directly
  ansible.builtin.systemd_service:
    name: "{{ sshd_service_name }}"
    enabled: true
    state: started
  register: sshd_service_direct_result
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['service_mgr'] == 'systemd'
    - sshd_socket_unit_state is defined
    - sshd_socket_unit_state.rc == 0
    - sshd_socket_unit_state.stdout | trim != 'not-found'

- name: Disable Debian-family SSH socket activation when present
  ansible.builtin.systemd_service:
    name: "{{ sshd_socket_unit_name }}"
    enabled: false
    state: stopped
  register: sshd_socket_disable_result
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['service_mgr'] == 'systemd'
    - sshd_socket_unit_state is defined
    - sshd_socket_unit_state.rc == 0
    - sshd_socket_unit_state.stdout | trim != 'not-found'

- name: Check for a managed SELinux SSH port marker
  ansible.builtin.stat:
    path: "{{ sshd_selinux_managed_port_marker_path }}"
  register: sshd_selinux_managed_port_marker
  when: sshd_manage_selinux_port | bool

- name: Read the managed SELinux SSH port marker
  ansible.builtin.slurp:
    path: "{{ sshd_selinux_managed_port_marker_path }}"
  register: sshd_selinux_managed_port_marker_content
  when:
    - sshd_manage_selinux_port | bool
    - sshd_selinux_managed_port_marker.stat.exists

- name: Determine the previously managed SELinux SSH port
  ansible.builtin.set_fact:
    sshd_selinux_previous_managed_port: >-
      {{
        (
          sshd_selinux_managed_port_marker_content.content
          | b64decode
          | trim
        )
        if sshd_selinux_managed_port_marker.stat.exists
        else ''
      }}
  when: sshd_manage_selinux_port | bool

- name: Ensure SELinux tooling is available for managed SSH ports
  ansible.builtin.package:
    name: "{{ sshd_selinux_packages }}"
    state: present
  when:
    - sshd_manage_selinux_port | bool
    - >-
      (sshd_port | int != 22)
      or (sshd_selinux_previous_managed_port | default('', true) | length > 0)

- name: Allow configured SSH port in SELinux policy
  community.general.seport:
    ports:
      - "{{ sshd_port | string }}"
    proto: tcp
    setype: ssh_port_t
    state: present
  when:
    - sshd_manage_selinux_port | bool
    - sshd_port | int != 22

- name: Refuse to disable SSH passwords without file-backed keys
  when:
    - not sshd_password_authentication | bool
    - not sshd_skip_authorized_keys_check | bool
  block:
    - name: Ensure SSH access preflight has users to check
      ansible.builtin.assert:
        that:
          - sshd_authorized_keys_check_users | length > 0
        fail_msg: >-
          Refusing to disable SSH password authentication because there are no
          users configured for the authorized_keys preflight. Set ansible_user
          or sshd_authorized_keys_check_users, or set
          sshd_skip_authorized_keys_check=true if you use external SSH auth.

    - name: Resolve home directories for SSH access preflight users
      ansible.builtin.command: "getent passwd {{ item }}"
      loop: "{{ sshd_authorized_keys_check_users }}"
      register: sshd_authorized_keys_passwd
      changed_when: false
      failed_when: false

    - name: Refuse to continue when a checked SSH user does not exist
      ansible.builtin.assert:
        that:
          - item.rc == 0
        fail_msg: >-
          Refusing to disable SSH password authentication because the checked
          user {{ item.item }} does not exist on the host. Adjust
          sshd_authorized_keys_check_users or set
          sshd_skip_authorized_keys_check=true if you use external SSH auth.
      loop: "{{ sshd_authorized_keys_passwd.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Initialize SSH access preflight targets
      ansible.builtin.set_fact:
        sshd_authorized_keys_targets: []

    - name: Build SSH access preflight targets
      ansible.builtin.set_fact:
        sshd_authorized_keys_targets: >-
          {{
            sshd_authorized_keys_targets + [
              {
                'user': item.item,
                'path': ((item.stdout.split(':'))[5]) ~ '/.ssh/authorized_keys'
              }
            ]
          }}
      loop: "{{ sshd_authorized_keys_passwd.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check authorized_keys files for SSH access preflight users
      ansible.builtin.stat:
        path: "{{ item.path }}"
      loop: "{{ sshd_authorized_keys_targets }}"
      loop_control:
        label: "{{ item.user }}"
      register: sshd_authorized_keys_files

    - name: Refuse to disable SSH passwords when no authorized_keys file is present
      ansible.builtin.assert:
        that:
          - >-
            (
              sshd_authorized_keys_files.results
              | selectattr('stat.exists')
              | selectattr('stat.isreg')
              | selectattr('stat.size', 'gt', 0)
              | list
              | length
            ) > 0
        fail_msg: >-
          Refusing to disable SSH password authentication because none of the
          checked users ({{ sshd_authorized_keys_check_users | join(', ') }})
          has a non-empty authorized_keys file. Add a public key first, set
          sshd_password_authentication=true for this host, or set
          sshd_skip_authorized_keys_check=true if you use external SSH auth.

- name: Manage sshd baseline drop-in safely
  block:
    - name: Install sshd baseline drop-in
      ansible.builtin.template:
        src: baseline.conf.j2
        dest: "{{ sshd_config_path }}"
        owner: root
        group: root
        mode: "0644"
        backup: true
      register: sshd_dropin_result

    - name: Validate updated sshd configuration
      ansible.builtin.command: "{{ sshd_binary_path }} -t"
      changed_when: false
      when: sshd_dropin_result.changed

  rescue:
    - name: Restore previous sshd drop-in from backup
      ansible.builtin.copy:
        src: "{{ sshd_dropin_result.backup_file }}"
        dest: "{{ sshd_config_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      when:
        - sshd_dropin_result is defined
        - sshd_dropin_result.backup_file is defined

    - name: Remove invalid sshd drop-in when no backup exists
      ansible.builtin.file:
        path: "{{ sshd_config_path }}"
        state: absent
      when:
        - sshd_dropin_result is defined
        - sshd_dropin_result.backup_file is not defined

    - name: Stop after restoring previous sshd configuration
      ansible.builtin.fail:
        msg: >-
          Refused to keep the new sshd drop-in because validation failed.
          The previous drop-in has been restored.

- name: Determine whether sshd runtime reload is required
  ansible.builtin.set_fact:
    sshd_runtime_reload_required: >-
      {{
        (sshd_dropin_result is defined and sshd_dropin_result.changed)
        or (
          (
            (sshd_service_direct_result is defined and sshd_service_direct_result.changed)
            or (sshd_socket_disable_result is defined and sshd_socket_disable_result.changed)
          )
          and (
            sshd_port | string
            != (
              sshd_current_connection_port
              | default(ansible_port | default(ansible_ssh_port | default(22)))
              | string
            )
          )
        )
      }}

- name: Reload sshd
  ansible.builtin.systemd_service:
    name: "{{ sshd_service_name }}"
    state: reloaded
  when:
    - sshd_runtime_reload_required | bool

- name: Wait for sshd to listen on the configured port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ sshd_port | int }}"
    state: started
    timeout: 30
  when:
    - sshd_runtime_reload_required | bool

- name: Remove stale managed SSH SELinux custom ports
  community.general.seport:
    ports:
      - "{{ sshd_selinux_previous_managed_port }}"
    proto: tcp
    setype: ssh_port_t
    local: true
    state: absent
  when:
    - sshd_manage_selinux_port | bool
    - sshd_selinux_previous_managed_port | default('', true) | length > 0
    - sshd_selinux_previous_managed_port != '22'
    - sshd_selinux_previous_managed_port != (sshd_port | string)

- name: Record the managed SELinux SSH port
  ansible.builtin.copy:
    dest: "{{ sshd_selinux_managed_port_marker_path }}"
    content: "{{ sshd_port | string }}\n"
    owner: root
    group: root
    mode: "0600"
  when:
    - sshd_manage_selinux_port | bool
    - sshd_port | int != 22

- name: Remove the managed SELinux SSH port marker on the default port
  ansible.builtin.file:
    path: "{{ sshd_selinux_managed_port_marker_path }}"
    state: absent
  when:
    - sshd_manage_selinux_port | bool
    - sshd_port | int == 22
